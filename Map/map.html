<!doctype html>
<html lang="en" data-bs-theme="dark" class="h-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food & Home | Find</title>

    <link rel="stylesheet" href="../Scss/main.css" />
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <link
      rel="stylesheet"
      href="../node_modules/bootstrap-icons/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="map.css" />
    <script
      id="search-js"
      defer=""
      src="https://api.mapbox.com/search-js/v1.5.1/web.js"
    ></script>
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.1/mapbox-gl.js"></script>
  </head>

  <body class="d-flex flex-column h-100">
    <div
      class="offcanvas offcanvas-start"
      tabindex="-1"
      id="offcanvas_map_info"
      aria-labelledby="offcanvasLabel"
    >
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasLabel">
          Location Information
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body">
        <div class="accordion" id="offcanvas_accordion">
          <div class="accordion-item">
            <h2 class="accordion-header" id="">
              <button
                class="accordion-button"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseOne"
                aria-expanded="true"
                aria-controls="collapseOne"
              >
                Information
              </button>
            </h2>
            <div
              id="collapseOne"
              class="accordion-collapse collapse show"
              aria-labelledby="headingOne"
            >
              <div class="accordion-body" id="OffCanvas_Main_Info">test1</div>
            </div>
          </div>
          <div class="accordion-item">
            <h2 class="accordion-header" id="headingTwo">
              <button
                class="accordion-button collapsed"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#collapseTwo"
                aria-expanded="false"
                aria-controls="collapseTwo"
              >
                Extra Information
              </button>
            </h2>
            <div
              id="collapseTwo"
              class="accordion-collapse collapse"
              aria-labelledby="headingTwo"
            >
              <div class="accordion-body" id="OffCanvas_Extra_Info">test 2</div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <nav class="navbar sticky-top navbar-expand-lg" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="../index.html">Food & Home</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-between"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link text-light" href="../Map/map.html"
                ><i class="bi bi-search me-2"></i>Find</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href=""
                ><i class="bi bi-patch-plus me-2"></i>Contribute</a
              >
            </li>
          </ul>
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link text-light" href="../About/about.html"
                ><span class="me-2">😎</span>About us</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-light" href="../Credits/credits.html"
                ><i class="bi bi-clipboard me-2"></i>Credits</a
              >
            </li>
            <li class="nav-item py-2 py-lg-1 col-12 col-lg-auto">
              <div class="vr d-none d-lg-flex h-100 mx-lg-2 bg-white"></div>
              <hr class="d-lg-none my-2 text-white-50" />
            </li>
            <li class="nav-item dropdown" data-bs-theme="light">
              <a
                class="nav-link dropdown-toggle d-flex align-items-center"
                href="#"
                id="theme-menu"
                aria-expanded="false"
                data-bs-toggle="dropdown"
                data-bs-display="static"
                aria-label="Toggle theme"
              >
                <i class="bi bi-circle-half"></i>
                <span class="d-lg-none ms-2">Toggle theme</span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end">
                <li>
                  <button
                    id="Map_Lighting_Light_BTN"
                    type="button"
                    class="dropdown-item d-flex align-items-center"
                    data-bs-theme-value="light"
                    aria-pressed="false"
                  >
                    <i class="bi bi-sun-fill"></i
                    ><span class="ms-2">Light</span>
                  </button>
                </li>
                <li>
                  <button
                    id="Map_Lighting_Dark_BTN"
                    type="button"
                    class="dropdown-item d-flex align-items-center"
                    data-bs-theme-value="dark"
                    aria-pressed="true"
                  >
                    <i class="bi bi-moon-stars-fill"></i
                    ><span class="ms-2">Dark</span>
                  </button>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main
      class="p-0 m-0 flex-grow-1 container-fluid d-flex flex-column align-items-center"
    >
      <section
        class="container-fluid h-100 p-0 m-0 d-flex flex-column align-items-center justify-content-center"
      >
        <div class="container-fluid p-0 m-0 h-100 w-100 position-relative">
          <nav id="menu"></nav>
          <div id="map"></div>

          <div
            class="btn-group position-absolute"
            id="Map_Layer_Controls"
            role="group"
            aria-label="Basic checkbox toggle button group"
          ></div>

          <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div
              class="toast"
              role="alert"
              aria-live="assertive"
              aria-atomic="true"
              id="Map_Lighting_Mode_Reminder_Toast"
            >
              <div class="toast-header">
                <strong class="me-auto">Tip🔨😎</strong>
                <small>just now</small>
                <button
                  type="button"
                  class="btn-close ms-2 mb-1"
                  data-bs-dismiss="toast"
                  aria-label="Close"
                >
                  <span aria-hidden="true"></span>
                </button>
              </div>
              <div class="toast-body">
                Hello! You can use the <i class="bi bi-circle-half"></i> button
                of this page to change the lighting of the map to day and night
                🙌 <br />
                Choose a map lighting to stop this message from appearing
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="../env.js"></script>
    <script src="api_data_manager.js"></script>
    <script src="names.js"></script>
    <script src="offcanvas.js" defer></script>
    <script src="map.js" defer></script>
  </body>
</html>
